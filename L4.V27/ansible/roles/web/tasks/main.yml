- name: Install nginx and Python runtime
  ansible.builtin.apt:
    name: "{{ web_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create application service account
  ansible.builtin.user:
    name: app
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create operator account
  ansible.builtin.user:
    name: operator
    shell: /bin/bash
    password: "{{ operator_password_hash }}"
    update_password: on_create
    create_home: true

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /opt/mywebapp
      owner: app
      group: app
      mode: '0750'
    - path: /opt/mywebapp/app
      owner: app
      group: app
      mode: '0750'
    - path: /etc/mywebapp
      owner: root
      group: app
      mode: '0750'

- name: Copy web application source
  ansible.builtin.copy:
    src: app/
    dest: /opt/mywebapp/app/
    owner: app
    group: app
    mode: preserve
  notify: Restart mywebapp

- name: Install Python requirements in an isolated virtual environment
  ansible.builtin.pip:
    requirements: /opt/mywebapp/app/requirements.txt
    virtualenv: /opt/mywebapp/venv
    virtualenv_command: python3 -m venv
  notify: Restart mywebapp

- name: Render application configuration with database VM address
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/mywebapp/config.toml
    owner: root
    group: app
    mode: '0640'
  notify: Restart mywebapp

- name: Install systemd service
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/mywebapp.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart mywebapp

- name: Install nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx-mywebapp.conf.j2
    dest: /etc/nginx/conf.d/mywebapp.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Install limited sudo rules for operator
  ansible.builtin.template:
    src: operator-mywebapp.sudoers.j2
    dest: /etc/sudoers.d/operator-mywebapp
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Enable nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Flush service handlers before migration
  ansible.builtin.meta: flush_handlers

- name: Ensure application service is enabled and running
  ansible.builtin.systemd:
    name: mywebapp
    enabled: true
    state: started
