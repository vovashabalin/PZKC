name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Check Python
        run: |
          ruff check L1.V27/app L1.V27/tests
          ruff format --check L1.V27/app L1.V27/tests
      - name: Check shell scripts
        run: shellcheck $(find L1.V27 L2.V27 L3.V27 -type f -name '*.sh' -print)
      - name: Check YAML
        run: |
          yamllint .github L2.V27 L3.V27

  tests:
    name: tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r L1.V27/app/requirements.txt pytest pytest-cov
      - name: Run tests and enforce coverage
        working-directory: L1.V27/app
        run: |
          PYTHONPATH=. pytest ../tests --cov=mywebapp --cov-report=term-missing \
            --cov-report=xml:coverage.xml --cov-fail-under=40
      - name: Upload coverage report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: L1.V27/app/coverage.xml
          if-no-files-found: error

  image:
    name: build-and-publish-image
    needs: [lint, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mywebapp
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=sha,format=long,prefix=sha-
      - uses: docker/setup-buildx-action@v3
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: L1.V27/app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
