name: CD

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require an annotated release tag
        run: |
          git fetch --force --tags
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install analysis and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          python -m pip install --upgrade pip
          python -m pip install -r L1.V27/app/requirements.txt pytest pytest-cov ruff yamllint
      - name: Run static analysis
        run: |
          ruff check L1.V27/app L1.V27/tests
          ruff format --check L1.V27/app L1.V27/tests
          find L1.V27 L2.V27 L3.V27 -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
          yamllint .github L2.V27 L3.V27
      - name: Run tests with coverage gate
        working-directory: L1.V27/app
        run: PYTHONPATH=. pytest ../tests --cov=mywebapp --cov-fail-under=40

  image:
    name: build-and-publish-release-image
    needs: quality-gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mywebapp
          tags: |
            type=raw,value=stable
            type=ref,event=tag
            type=sha,format=long,prefix=sha-
      - uses: docker/setup-buildx-action@v3
      - name: Build and publish release image
        uses: docker/build-push-action@v6
        with:
          context: L1.V27/app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: deploy-to-target
    needs: image
    runs-on: [self-hosted, linux, x64, lab3-runner]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy image from GHCR
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/mywebapp:${{ github.ref_name }}
        run: L3.V27/scripts/deploy-from-runner.sh
      - name: Verify deployment
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
        run: L3.V27/scripts/verify-deployment.sh
