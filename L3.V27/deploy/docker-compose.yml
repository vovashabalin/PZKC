name: mywebapp

services:
  db:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  app:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    restart: unless-stopped
    environment:
      CONFIG_PATH: /etc/mywebapp/config.toml
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      GUNICORN_WORKERS: "2"
    volumes:
      - ./config.toml:/etc/mywebapp/config.toml:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - private

networks:
  private:
    name: mywebapp_private
    driver: bridge
    internal: true

volumes:
  postgres_data:
    name: mywebapp_postgres_data
