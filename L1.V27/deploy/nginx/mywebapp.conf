server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp_access.log;
    error_log  /var/log/nginx/mywebapp_error.log warn;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Public API: only the root endpoint and the three business endpoints.
    location = / {
        proxy_pass http://127.0.0.1:3000;
    }

    location = /notes {
        proxy_pass http://127.0.0.1:3000;
    }

    location ~ ^/notes/[0-9]+$ {
        proxy_pass http://127.0.0.1:3000;
    }

    # Health checks remain available only locally on 127.0.0.1:3000.
    location / {
        return 404;
    }
}
