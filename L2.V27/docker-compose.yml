name: mywebapp-l2

services:
  db:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?create .env from .env.example first}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  app:
    build:
      context: ../L1.V27/app
      dockerfile: Dockerfile
    image: mywebapp:lab2
    restart: unless-stopped
    environment:
      CONFIG_PATH: /etc/mywebapp/config.toml
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?create .env from .env.example first}
      GUNICORN_WORKERS: "2"
    volumes:
      - ./config/app.toml:/etc/mywebapp/config.toml:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private

  nginx:
    image: nginx:1.27.5-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - private

networks:
  private:
    name: mywebapp_private
    driver: bridge
    internal: true

volumes:
  postgres_data:
    name: mywebapp_postgres_data
